name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: v2.0 visa-mcp shim + backend smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install (visa-mcp + lab-executor-mcp from PyPI / git)
        run: |
          python -m pip install --upgrade pip
          # lab-executor-mcp は PyPI 公開済 (2.35.1~)。pyproject の
          # 依存指定どおりに解決させる (git pin をやめた)。
          pip install -e .
          pip install pytest pytest-asyncio pytest-mock pyvisa
      - name: import smoke
        run: |
          python -c "import visa_mcp; print('visa-mcp:', visa_mcp.__version__)"
          python -c "import lab_executor; print('lab-executor-mcp:', lab_executor.__version__)"
      - name: shim + backend smoke tests (v2.0)
        run: pytest tests/test_v200_shim.py -v

  build:
    name: wheel build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          pip install build
          python -m build
      - name: Install wheel + import
        run: |
          pip install dist/*.whl
          python -c "import visa_mcp; print('visa-mcp:', visa_mcp.__version__)"
          python -c "from visa_mcp.backends.pyvisa_backend import PyVisaBackend; b=PyVisaBackend(); print('PyVisaBackend OK')"
