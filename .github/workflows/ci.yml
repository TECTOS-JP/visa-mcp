name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit and BEF conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install package and development dependencies
        run: python -m pip install -e ".[dev]"
      - name: BEF conformance kit
        run: python -m pytest -q tests/test_backend_conformance.py
      - name: Unit test suite
        run: python -m pytest -q -m "not hardware"

  latest-release-integration:
    name: lab-executor latest release integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      # Project dependencies resolve lab-executor-mcp from PyPI.
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q tests/test_backend_conformance.py tests/test_backend_discovery.py

  main-compatibility-smoke:
    name: lab-executor main compatibility smoke
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Replace release runtime with development main
        run: python -m pip install --upgrade --force-reinstall "lab-executor-mcp @ git+https://github.com/TECTOS-JP/lab-executor-mcp@main"
      - run: python -m pytest -q tests/test_backend_conformance.py tests/test_backend_discovery.py

  build:
    name: wheel build verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build
      - name: Install wheel + import
        run: |
          python -m pip install dist/*.whl
          python -c "import visa_mcp; print('visa-mcp:', visa_mcp.__version__)"
          python -c "from visa_mcp.discovery import make_backend; print(make_backend().prefixes)"
