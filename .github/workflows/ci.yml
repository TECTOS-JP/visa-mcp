name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: pytest (full, with pyvisa)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-mock pyvisa
      - name: Run tests (skip hardware)
        run: pytest -k "not hardware_integration" -q

  pyvisa-not-installed:
    name: separation boundary (pyvisa NOT installed)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install without pyvisa
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-mock
      - name: Ensure pyvisa is NOT installed
        run: |
          pip uninstall -y pyvisa pyvisa-py || true
          ! python -c "import pyvisa" 2>/dev/null
      - name: runtime candidate modules import without pyvisa
        run: |
          python -c "import visa_mcp.dsl; import visa_mcp.extension; import visa_mcp.extension_packaging; import visa_mcp.extension_install; import visa_mcp.extension_catalog; import visa_mcp.extension_authoring; import visa_mcp.extension_integrity; import visa_mcp.instrument_authoring; import visa_mcp.observation; import visa_mcp.testing"
      - name: dependency_report (CLI)
        run: python -m visa_mcp.dev.dependency_report --json
      - name: boundary smoke tests
        run: pytest tests/test_separation_boundary.py -v
      - name: validate / extension CLI smoke (no pyvisa)
        run: |
          python -m visa_mcp.cli validate extension examples/extensions/mock_basic_pack/extension.yaml --json > /dev/null
          python -m visa_mcp.cli extension catalog --packages examples/extensions/ --json > /dev/null || true

  lint:
    name: format / multi-line guards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-mock pyvisa
      - name: Run repo format tests
        run: pytest -k "lf_only or multiline" -q
