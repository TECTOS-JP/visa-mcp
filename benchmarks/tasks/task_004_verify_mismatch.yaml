id: task_004_verify_mismatch
title: Verify mismatch is detected and surfaced
description: >
  set_voltage の後の verify read-back で意図的に -0.2V のオフセットを返し、
  verify mismatch が summary.verify_summary に反映されることを確認。

layer: execute

input:
  instruction: "Set voltage 5V with verify; PSU returns 4.8V on readback."
  plan:
    dsl_version: "0.8"
    name: verify_mismatch
    bindings: { psu: mock_psu }
    steps:
      - { type: command, instrument: $psu, command: set_voltage, args: { voltage: 5.0 } }

expected:
  plan_features:
    uses_verify: true
  required_tool_sequence:
    required_order:
      - validate_experiment_plan
      - start_experiment_job
  success_criteria:
    validation_status: ok
    job_status: completed
    # NOTE: verify 失敗は permissive mode では step success のまま記録のみ。
    # job_steps への永続化と verify_summary 集計を厳密に確認するのは
    # tests/test_benchmark_v090.py の verify mismatch ケースで行う。

fixtures:
  system_config: fixtures/system_config_basic.yaml
  instruments:
    - fixtures/instruments/mock_psu.yaml
  mock_scenarios:
    psu001:
      - command_pattern: "VOLT 5\\.0"
        mode: verify_mismatch
        actual_offset: -0.2
      - command_pattern: "MEAS:VOLT\\?"
        mode: verify_mismatch
        actual_offset: -0.2
