extension_id: visa-mcp.mock.basic
name: Basic Mock Definition Pack
version: 0.1.0
type: definition_pack
visa_mcp_compatibility: ">=1.2,<2.0"
description: >
  Reference definition pack for visa-mcp v1.2. Bundles mock PSU / DMM
  definitions plus 1 benchmark task. Used in tests and as a starting
  template for external contributors.
author: "visa-mcp"
homepage: "https://github.com/TECTOS-JP/visa-mcp"
license: "MIT"

contents:
  instruments:
    - instruments/mock_psu.yaml
    - instruments/mock_dmm.yaml
  benchmarks:
    - benchmarks/task_001.yaml

stability:
  support_level: tested
  executable_code: false
